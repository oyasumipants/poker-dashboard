<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>oyasumipan Poker Dashboard</title>
  <link rel="stylesheet" href="style.css?v=2">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>
  <h1>oyasumipan Poker Dashboard</h1>
  <p class="subtitle">TenFour 6-Max NLH Fast Fold | 2026/03/15 ~</p>
  <nav>
    <a href="index.html" class="active">ダッシュボード</a>
    <a href="sessions.html">セッション履歴</a>
    <a href="strategy.html">ポジション戦略</a>
    <a href="glossary.html">用語集</a>
  </nav>

  <div class="stats-grid" id="overview-stats"></div>

  <div class="chart-container">
    <h2 class="has-tooltip" data-tooltip="セッションごとの累計損益をbb（ビッグブラインド）単位で表示。右肩上がり=勝っている、右肩下がり=負けている">累計損益 (bb)</h2>
    <canvas id="plChart"></canvas>
  </div>

  <div class="chart-row">
    <div class="chart-container">
      <h2 class="has-tooltip" data-tooltip="VPIP=参加率、PFR=レイズ率、3bet=再レイズ率、CBet=継続ベット率。各指標の推移を確認できる">スタッツ推移</h2>
      <canvas id="statsChart"></canvas>
    </div>
    <div class="chart-container">
      <h2 class="has-tooltip" data-tooltip="各セッションの損益。緑=プラス、赤=マイナス。大きな赤棒はクーラー（避けようがない不運）の可能性あり">セッション別損益 (bb)</h2>
      <canvas id="sessionBarChart"></canvas>
    </div>
  </div>

  <h3 class="section-title has-tooltip" data-tooltip="全セッションを合算した、ポジション（席順）ごとの損益とハンド数。席による得意/不得意がわかる">ポジション別 累計損益</h3>
  <div class="pos-grid" id="pos-grid"></div>

  <div class="chart-row">
    <div class="chart-container">
      <h2 class="has-tooltip" data-tooltip="セッションごと×ポジション別の損益の内訳。どの席でどれだけ勝ち負けしたかがわかる">ポジション別損益（セッション内訳）</h2>
      <canvas id="posChart"></canvas>
    </div>
    <div class="chart-container">
      <h2 class="has-tooltip" data-tooltip="直近3セッションのポジション別参加率。UTG/HJは低め、BTN/SBは高めが理想">ポジション別参加率（直近3回）</h2>
      <canvas id="vpipPosChart"></canvas>
    </div>
  </div>

  <div class="footer">最終更新: 2026/03/18 | TenFour Poker からスクレイピングしたデータに基づく</div>

<script>
const S = [
  {l:"3/15 20:28",h:100,bb:-94.18,vpip:34.0,pfr:20.0,tb:11.8,cb:85.7,p:{BB:{c:8,r:-5.02,v:62.5},SB:{c:23,r:-51.13,v:26.1},BTN:{c:19,r:-127.53,v:31.6},UTG:{c:16,r:12.02,v:31.2},CO:{c:17,r:-26.46,v:23.5},HJ:{c:17,r:103.94,v:47.1}}},
  {l:"3/15 23:38",h:50,bb:24.14,vpip:38.0,pfr:34.0,tb:35.7,cb:66.7,p:{HJ:{c:10,r:-0.83,v:20.0},SB:{c:10,r:26.55,v:60.0},UTG:{c:7,r:3.32,v:42.9},BB:{c:9,r:4.27,v:44.4},CO:{c:6,r:3.0,v:33.3},BTN:{c:8,r:-12.17,v:25.0}}},
  {l:"3/16 00:44",h:68,bb:98.86,vpip:32.4,pfr:17.6,tb:18.2,cb:33.3,p:{UTG:{c:12,r:-6.0,v:16.7},CO:{c:8,r:112.4,v:25.0},BB:{c:10,r:-10.08,v:70.0},HJ:{c:12,r:2.02,v:16.7},BTN:{c:12,r:-15.88,v:41.7},SB:{c:14,r:16.4,v:28.6}}},
  {l:"3/16 09:54",h:100,bb:-139.24,vpip:25.0,pfr:13.0,tb:4.8,cb:60.0,p:{SB:{c:19,r:4.65,v:21.1},HJ:{c:20,r:-115.96,v:35.0},CO:{c:15,r:13.52,v:26.7},BB:{c:23,r:-38.8,v:26.1},UTG:{c:14,r:4.12,v:7.1},BTN:{c:9,r:-6.77,v:33.3}}},
  {l:"3/16 21:44",h:99,bb:20.96,vpip:29.3,pfr:19.2,tb:8.9,cb:60.0,p:{HJ:{c:17,r:-20.0,v:29.4},CO:{c:9,r:0.0,v:0.0},SB:{c:15,r:-9.68,v:26.7},BTN:{c:15,r:5.12,v:26.7},BB:{c:22,r:115.42,v:36.4},UTG:{c:21,r:-69.9,v:38.1}}},
  {l:"3/17 00:35",h:100,bb:-11.76,vpip:32.0,pfr:23.0,tb:11.9,cb:66.7,p:{CO:{c:21,r:-23.9,v:33.3},BTN:{c:11,r:-31.78,v:72.7},UTG:{c:15,r:-13.58,v:13.3},HJ:{c:21,r:49.4,v:33.3},BB:{c:13,r:26.7,v:23.1},SB:{c:19,r:-18.6,v:26.3}}},
  {l:"3/17 01:40",h:100,bb:72.78,vpip:35.0,pfr:20.0,tb:19.1,cb:54.5,p:{CO:{c:21,r:3.19,v:28.6},SB:{c:15,r:52.59,v:53.3},HJ:{c:17,r:44.8,v:35.3},BB:{c:19,r:-46.28,v:42.1},BTN:{c:14,r:-23.27,v:42.9},UTG:{c:14,r:41.75,v:7.1}}},
  {l:"3/17 03:03",h:100,bb:4.01,vpip:26.0,pfr:14.0,tb:7.1,cb:85.7,p:{SB:{c:18,r:-39.6,v:44.4},CO:{c:12,r:1.5,v:8.3},HJ:{c:22,r:30.75,v:22.7},UTG:{c:22,r:6.1,v:4.5},BTN:{c:12,r:1.0,v:25.0},BB:{c:14,r:4.26,v:57.1}}},
  {l:"3/18 02:10",h:100,bb:-110.12,vpip:32.0,pfr:16.0,tb:3.9,cb:58.3,p:{BB:{c:25,r:-157.46,v:48.0},UTG:{c:15,r:18.1,v:13.3},CO:{c:15,r:22.62,v:26.7},SB:{c:15,r:0.8,v:46.7},HJ:{c:15,r:7.52,v:13.3},BTN:{c:15,r:-1.7,v:33.3}}}
];
const PO=['UTG','HJ','CO','BTN','SB','BB'];
const PC={UTG:'#58a6ff',HJ:'#bc8cff',CO:'#39d2c0',BTN:'#d29922',SB:'#f0883e',BB:'#f85149'};
const tH=S.reduce((a,x)=>a+x.h,0), tBB=S.reduce((a,x)=>a+x.bb,0);
const aV=(S.reduce((a,x)=>a+x.vpip*x.h,0)/tH).toFixed(1);
const aP=(S.reduce((a,x)=>a+x.pfr*x.h,0)/tH).toFixed(1);
const a3=(S.reduce((a,x)=>a+x.tb*x.h,0)/tH).toFixed(1);
const aC=(S.reduce((a,x)=>a+x.cb*x.h,0)/tH).toFixed(1);
const bp=(tBB/tH*100).toFixed(1);

document.getElementById('overview-stats').innerHTML=`
<div class="stat-card"><div class="label has-tooltip" data-tooltip="これまでにプレイした全ハンド数">総ハンド数</div><div class="value">${tH}</div><div class="detail">${S.length} セッション</div></div>
<div class="stat-card"><div class="label has-tooltip" data-tooltip="全セッションの合計損益（bb単位）。bb/100は100ハンドあたりの平均損益">累計損益</div><div class="value ${tBB>=0?'positive':'negative'}">${tBB>=0?'+':''}${tBB.toFixed(1)}bb</div><div class="detail">${bp}bb/100</div></div>
<div class="stat-card"><div class="label has-tooltip" data-tooltip="自分からチップを出してゲームに参加した割合。理想は25-30%。高すぎると弱い手で参加しすぎ">平均 VPIP</div><div class="value">${aV}%</div><div class="detail">目標: 25-30%</div></div>
<div class="stat-card"><div class="label has-tooltip" data-tooltip="プリフロップ（最初の2枚）でレイズした割合。理想は18-22%。VPIPとの差が小さいほど攻撃的">平均 PFR</div><div class="value">${aP}%</div><div class="detail">目標: 18-22%</div></div>
<div class="stat-card"><div class="label has-tooltip" data-tooltip="相手のレイズにさらにレイズし返した割合。低すぎるとコールばかりで搾取される">平均 3bet</div><div class="value">${a3}%</div><div class="detail">目標: 8-10%</div></div>
<div class="stat-card"><div class="label has-tooltip" data-tooltip="プリフロップでレイズした後、フロップでも続けてベットした割合。主導権を維持する重要な指標">平均 CBet</div><div class="value">${aC}%</div><div class="detail">目標: 65-75%</div></div>`;

let cum=0;const cumD=S.map(s=>{cum+=s.bb;return Math.round(cum*100)/100;});
new Chart(document.getElementById('plChart'),{type:'line',data:{labels:S.map(s=>s.l),datasets:[{label:'累計bb',data:cumD,borderColor:'#58a6ff',backgroundColor:'rgba(88,166,255,0.1)',fill:true,tension:0.3,pointRadius:5,pointBackgroundColor:cumD.map(v=>v>=0?'#3fb950':'#f85149'),borderWidth:2}]},options:{responsive:true,plugins:{legend:{display:false},tooltip:{callbacks:{afterLabel:ctx=>`このセッション: ${S[ctx.dataIndex].bb>=0?'+':''}${S[ctx.dataIndex].bb.toFixed(1)}bb`}}},scales:{x:{ticks:{color:'#8b949e'},grid:{color:'#21262d'}},y:{ticks:{color:'#8b949e',callback:v=>v+'bb'},grid:{color:'#21262d'}}}}});

new Chart(document.getElementById('statsChart'),{type:'line',data:{labels:S.map(s=>s.l),datasets:[{label:'VPIP（参加率）',data:S.map(s=>s.vpip),borderColor:'#58a6ff',tension:0.3,pointRadius:3,borderWidth:2},{label:'PFR（レイズ率）',data:S.map(s=>s.pfr),borderColor:'#3fb950',tension:0.3,pointRadius:3,borderWidth:2},{label:'3bet（再レイズ率）',data:S.map(s=>s.tb),borderColor:'#bc8cff',tension:0.3,pointRadius:3,borderWidth:2},{label:'CBet（継続ベット率）',data:S.map(s=>s.cb),borderColor:'#d29922',tension:0.3,pointRadius:3,borderWidth:2}]},options:{responsive:true,plugins:{legend:{labels:{color:'#8b949e'}}},scales:{x:{ticks:{color:'#8b949e'},grid:{color:'#21262d'}},y:{ticks:{color:'#8b949e',callback:v=>v+'%'},grid:{color:'#21262d'},min:0,max:100}}}});

new Chart(document.getElementById('sessionBarChart'),{type:'bar',data:{labels:S.map(s=>s.l),datasets:[{label:'セッション損益',data:S.map(s=>s.bb),backgroundColor:S.map(s=>s.bb>=0?'rgba(63,185,80,0.7)':'rgba(248,81,73,0.7)'),borderColor:S.map(s=>s.bb>=0?'#3fb950':'#f85149'),borderWidth:1}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#8b949e'},grid:{color:'#21262d'}},y:{ticks:{color:'#8b949e',callback:v=>v+'bb'},grid:{color:'#21262d'}}}}});

const pt={};PO.forEach(p=>{pt[p]={r:0,c:0};});S.forEach(s=>{PO.forEach(p=>{if(s.p[p]){pt[p].r+=s.p[p].r;pt[p].c+=s.p[p].c;}});});
document.getElementById('pos-grid').innerHTML=PO.map(p=>{const t=pt[p];const bp=t.c>0?(t.r/t.c*100).toFixed(1):'0';const cls=t.r>=0?'positive':'negative';return`<div class="pos-card has-tooltip" data-tooltip="${{UTG:'一番最初にアクションする席。不利なので強い手だけ',HJ:'UTGの次。やや前方寄り',CO:'BTNの1つ前。後方で有利',BTN:'最後にアクション。最強ポジション',SB:'0.5bb強制。フロップ以降最初にアクション',BB:'1bb強制。ブラインド席'}[p]}"><div class="pos-name" style="color:${PC[p]}">${p}</div><div class="pos-bb ${cls}">${t.r>=0?'+':''}${t.r.toFixed(1)}bb</div><div class="pos-detail">${t.c}ハンド | ${bp}bb/100</div></div>`;}).join('');

new Chart(document.getElementById('posChart'),{type:'bar',data:{labels:S.map(s=>s.l),datasets:PO.map(p=>({label:p,data:S.map(s=>s.p[p]?s.p[p].r:0),backgroundColor:PC[p]+'99',borderColor:PC[p],borderWidth:1}))},options:{responsive:true,plugins:{legend:{labels:{color:'#8b949e'}}},scales:{x:{stacked:true,ticks:{color:'#8b949e'},grid:{color:'#21262d'}},y:{stacked:true,ticks:{color:'#8b949e',callback:v=>v+'bb'},grid:{color:'#21262d'}}}}});

const l3=S.slice(-3);
new Chart(document.getElementById('vpipPosChart'),{type:'radar',data:{labels:PO,datasets:l3.map((s,i)=>({label:s.l,data:PO.map(p=>s.p[p]?s.p[p].v:0),borderColor:['#58a6ff','#bc8cff','#3fb950'][i],backgroundColor:['rgba(88,166,255,0.1)','rgba(188,140,255,0.1)','rgba(63,185,80,0.1)'][i],pointRadius:3,borderWidth:2}))},options:{responsive:true,plugins:{legend:{labels:{color:'#8b949e'}}},scales:{r:{angleLines:{color:'#21262d'},grid:{color:'#21262d'},pointLabels:{color:'#8b949e',font:{size:12}},ticks:{color:'#8b949e',backdropColor:'transparent'},min:0,max:80}}}});
</script>
</body>
</html>
